<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수석의 공부법 기본편 — 공부하는 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════ */
:root {
  --paper: #faf6ee;
  --paper-dark: #f0ead6;
  --ink: #2c2416;
  --ink-light: #5a4d3a;
  --accent: #8b6914;
  --accent-soft: #c9a84c;
  --red: #b83232;
  --blue: #2a5a8c;
  --spine: #3d2e1a;
  --shadow: rgba(44, 36, 22, 0.15);
  --chat-bg: #f7f4ed;
  --chat-user: #e8dcc8;
  --chat-ai: #fff;
  --radius: 4px;
  --font-serif: 'Nanum Myeongjo', serif;
  --font-sans: 'Noto Sans KR', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  background: #d6cfc0;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(180,160,120,0.2), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(160,140,100,0.15), transparent 60%);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  color: var(--ink);
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   Book Container
   ═══════════════════════════════════════════ */
.book-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1100px;
  padding: 20px 60px;
  gap: 0;
}

.book {
  position: relative;
  display: flex;
  width: 100%;
  max-width: 960px;
  aspect-ratio: 1.45 / 1;
  background: var(--paper);
  border-radius: 6px 12px 12px 6px;
  box-shadow:
    0 2px 8px var(--shadow),
    0 12px 40px rgba(44,36,22,0.2),
    inset 0 0 60px rgba(44,36,22,0.03);
  overflow: hidden;
}

/* Spine shadow */
.book::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 40px;
  transform: translateX(-50%);
  background: linear-gradient(90deg,
    rgba(44,36,22,0.08) 0%,
    rgba(44,36,22,0.15) 30%,
    rgba(44,36,22,0.22) 50%,
    rgba(44,36,22,0.15) 70%,
    rgba(44,36,22,0.08) 100%);
  z-index: 10;
  pointer-events: none;
}

/* Page top edge texture */
.book::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    var(--paper-dark) 0%, var(--paper) 5%, var(--paper-dark) 10%,
    var(--paper) 20%, var(--paper-dark) 30%, var(--paper) 50%,
    var(--paper-dark) 70%, var(--paper) 80%, var(--paper-dark) 95%,
    var(--paper) 100%);
  z-index: 11;
}

.page {
  flex: 1;
  padding: 40px 44px;
  overflow-y: auto;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--accent-soft) transparent;
}

.page::-webkit-scrollbar { width: 4px; }
.page::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 2px; }

.page-left {
  border-right: 1px solid rgba(44,36,22,0.08);
  background: linear-gradient(90deg, var(--paper) 0%, var(--paper) 95%, var(--paper-dark) 100%);
}

.page-right {
  background: linear-gradient(90deg, var(--paper-dark) 0%, var(--paper) 5%, var(--paper) 100%);
}

/* Page number */
.page-num {
  position: absolute;
  bottom: 16px;
  font-family: var(--font-sans);
  font-size: 0.7rem;
  color: var(--ink-light);
  opacity: 0.5;
}
.page-left .page-num { left: 44px; }
.page-right .page-num { right: 44px; }

/* ═══════════════════════════════════════════
   Navigation Arrows
   ═══════════════════════════════════════════ */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 80px;
  border: none;
  background: rgba(44,36,22,0.06);
  color: var(--ink-light);
  font-size: 1.4rem;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
}
.nav-btn:hover { background: rgba(44,36,22,0.12); color: var(--ink); }
.nav-btn:disabled { opacity: 0.2; cursor: default; }
.nav-prev { left: 8px; }
.nav-next { right: 8px; }

/* ═══════════════════════════════════════════
   Typography inside pages
   ═══════════════════════════════════════════ */
.page h1 {
  font-size: 1.5rem;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.page h2 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-top: 20px;
  margin-bottom: 8px;
  color: var(--accent);
}
.page p {
  font-size: 0.92rem;
  line-height: 1.85;
  margin-bottom: 12px;
  text-align: justify;
  word-break: keep-all;
}
.page .subtitle {
  font-family: var(--font-sans);
  font-size: 0.75rem;
  color: var(--ink-light);
  margin-bottom: 20px;
  letter-spacing: 0.05em;
}

.page .highlight {
  background: linear-gradient(180deg, transparent 55%, rgba(201,168,76,0.25) 55%);
  padding: 0 2px;
}

.page .quote-box {
  border-left: 3px solid var(--accent-soft);
  padding: 12px 16px;
  margin: 16px 0;
  background: rgba(201,168,76,0.06);
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.8;
}

.page .step-list {
  margin: 12px 0;
  padding-left: 0;
  list-style: none;
  counter-reset: step;
}
.page .step-list li {
  counter-increment: step;
  font-size: 0.9rem;
  line-height: 1.8;
  margin-bottom: 6px;
  padding-left: 28px;
  position: relative;
}
.page .step-list li::before {
  content: counter(step) ".";
  position: absolute;
  left: 0;
  font-weight: 700;
  color: var(--accent);
}

/* Probability funnel */
.funnel {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 16px 0;
  flex-wrap: wrap;
}
.funnel-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.funnel-circle {
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-sans);
  font-weight: 700;
  color: #fff;
  background: var(--accent);
}
.funnel-label {
  font-family: var(--font-sans);
  font-size: 0.65rem;
  color: var(--ink-light);
  text-align: center;
  max-width: 70px;
}
.funnel-arrow {
  font-size: 1rem;
  color: var(--ink-light);
  margin: 0 2px;
  align-self: center;
}

/* Purpose table */
.purpose-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.78rem;
  font-family: var(--font-sans);
}
.purpose-table th {
  background: var(--ink);
  color: var(--paper);
  padding: 6px 8px;
  font-weight: 500;
  text-align: center;
}
.purpose-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(44,36,22,0.1);
  line-height: 1.5;
  vertical-align: top;
}
.purpose-table tr:nth-child(even) td {
  background: rgba(44,36,22,0.02);
}

/* ═══════════════════════════════════════════
   Input Box (학생 답변 영역)
   ═══════════════════════════════════════════ */
.answer-area {
  margin: 16px 0;
  border: 2px dashed var(--accent-soft);
  border-radius: 8px;
  padding: 16px;
  background: rgba(255,255,255,0.5);
  position: relative;
}
.answer-area label {
  display: block;
  font-family: var(--font-sans);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 8px;
}
.answer-area label::before {
  content: '✏️ ';
}
.answer-area textarea {
  width: 100%;
  min-height: 80px;
  border: 1px solid rgba(44,36,22,0.15);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--ink);
  background: #fff;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.answer-area textarea:focus {
  border-color: var(--accent);
}
.answer-area textarea::placeholder {
  color: #b8a88a;
}
.submit-btn {
  margin-top: 10px;
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.submit-btn:hover { background: var(--spine); }
.submit-btn:disabled { opacity: 0.5; cursor: default; }

/* ═══════════════════════════════════════════
   Chat Panel (슬라이드)
   ═══════════════════════════════════════════ */
.chat-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,36,22,0.4);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.chat-overlay.open { opacity: 1; pointer-events: auto; }

.chat-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: min(440px, 92vw);
  background: var(--chat-bg);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -8px 0 30px rgba(44,36,22,0.2);
}
.chat-panel.open { transform: translateX(0); }

.chat-header {
  padding: 16px 20px;
  background: var(--spine);
  color: var(--paper);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-sans);
}
.chat-header h3 {
  font-size: 0.95rem;
  font-weight: 500;
}
.chat-close {
  background: none;
  border: none;
  color: var(--paper);
  font-size: 1.3rem;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.chat-close:hover { opacity: 1; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-bubble {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 12px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  line-height: 1.65;
  word-break: keep-all;
  animation: bubbleIn 0.3s ease-out;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.chat-bubble.user {
  align-self: flex-end;
  background: var(--chat-user);
  border-bottom-right-radius: 4px;
}
.chat-bubble.ai {
  align-self: flex-start;
  background: var(--chat-ai);
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.chat-bubble.typing {
  align-self: flex-start;
  background: var(--chat-ai);
  border-bottom-left-radius: 4px;
}
.typing-dots span {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--ink-light);
  border-radius: 50%;
  margin: 0 2px;
  animation: dot-bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid rgba(44,36,22,0.1);
  display: flex;
  gap: 8px;
  background: #fff;
}
.chat-input-area input {
  flex: 1;
  border: 1px solid rgba(44,36,22,0.15);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  outline: none;
}
.chat-input-area input:focus { border-color: var(--accent); }
.chat-send {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.chat-send:hover { background: var(--spine); }
.chat-send:disabled { opacity: 0.4; cursor: default; }

/* ═══════════════════════════════════════════
   Footer
   ═══════════════════════════════════════════ */
.book-footer {
  margin-top: 12px;
  font-family: var(--font-sans);
  font-size: 0.7rem;
  color: rgba(44,36,22,0.4);
  text-align: center;
}

/* ═══════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  body { justify-content: flex-start; padding-top: 8px; }
  .book-wrapper { padding: 8px 12px; }
  .book {
    flex-direction: column;
    aspect-ratio: auto;
    min-height: 80dvh;
    border-radius: 8px;
  }
  .book::before { display: none; }
  .page { padding: 24px 20px; }
  .page-left { border-right: none; border-bottom: 1px solid rgba(44,36,22,0.08); }
  .page-left .page-num { left: 20px; }
  .page-right .page-num { right: 20px; }
  .nav-btn { width: 36px; height: 60px; font-size: 1.1rem; }
  .nav-prev { left: 2px; }
  .nav-next { right: 2px; }
  .funnel { gap: 2px; }
  .funnel-circle { width: 36px!important; height: 36px!important; font-size: 0.6rem!important; }
  .funnel-label { font-size: 0.55rem; max-width: 50px; }
}

/* Hidden helper */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     BOOK STRUCTURE
     ═══════════════════════════════════════════ -->
<div class="book-wrapper">
  <button class="nav-btn nav-prev" id="prevBtn" aria-label="이전 페이지">◂</button>

  <div class="book" id="book">
    <div class="page page-left" id="pageLeft"></div>
    <div class="page page-right" id="pageRight"></div>
  </div>

  <button class="nav-btn nav-next" id="nextBtn" aria-label="다음 페이지">▸</button>
</div>

<div class="book-footer">ⓒ 수석의 방 · 수석의 공부법 기본편</div>

<!-- ═══════════════════════════════════════════
     CHAT OVERLAY & PANEL
     ═══════════════════════════════════════════ -->
<div class="chat-overlay" id="chatOverlay"></div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <h3>💬 김수석 선생님과 대화</h3>
    <button class="chat-close" id="chatClose">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="메시지를 입력하세요..." autocomplete="off">
    <button class="chat-send" id="chatSend" aria-label="보내기">➤</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   Configuration
   ═══════════════════════════════════════════ */
const API_URL = "https://study-reason.kimsoosuk1.workers.dev/api/chat";

/* ═══════════════════════════════════════════
   Page Content Data
   ═══════════════════════════════════════════ */
const pages = [
  // ──── Page 0: 표지 ────
  {
    html: `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;">
        <p class="subtitle" style="margin-bottom:12px;">수석의 공부법 기본편</p>
        <h1 style="font-size:1.8rem;margin-bottom:4px;">공부하는 이유</h1>
        <div style="width:40px;height:2px;background:var(--accent);margin:16px auto;"></div>
        <p style="font-size:0.82rem;color:var(--ink-light);text-align:center;">ⓒ 수석의 방</p>
      </div>
    `
  },
  // ──── Page 1: 질문으로 시작 ────
  {
    html: `
      <p class="subtitle">CHAPTER 01</p>
      <h2>공부를 왜 하나요?</h2>
      <p>오늘은 간단한 질문으로 시작해볼게요.</p>
      <p>여러분, 공부를 왜 하나요?</p>
      <p>우리 매일 학교와 학원과 인강, 자습 등등 공부를 많이 하잖아요. 나는 왜 공부를 하고 있을까?</p>
      <p>이 글을 읽기 전에 먼저 내가 생각하는 공부의 이유를 <span class="highlight">3가지만</span> 아래 빈 칸에 적어봅시다.</p>
      <div class="answer-area">
        <label>내가 공부하는 이유 3가지</label>
        <textarea id="answer1" placeholder="1. &#10;2. &#10;3. "></textarea>
        <button class="submit-btn" onclick="submitAnswer('answer1', '공부하는 이유 3가지를 물어보는 첫 질문')">선생님과 이야기하기</button>
      </div>
    `
  },
  // ──── Page 2: 흔한 대답 ────
  {
    html: `
      <h2>가장 흔한 대답</h2>
      <p>어때요? 잘 적을 수 있었나요?</p>
      <p>'그냥 하는데 딱히 이유랄 게 있나?' 싶을 수도 있고 '대학 때문에 공부하는 거죠.'라고 할 수도 있어요. 3가지를 적는 것이 쉽지 않았을 수 있고요.</p>
      <p>그 중 아무래도 가장 흔히 생각하고 주변에서도 많이 듣는 말은 <span class="highlight">'좋은 대학에 가려고'</span>일 거예요.</p>
      <p>그럼 왜 좋은 대학에 가려 하나요? 아마 '좋은 회사에 가서 돈 많이 벌고 잘 살려고요.'라고 대답하는 학생이 많을 겁니다.</p>
      <p>결국 돈을 잘 벌고 잘 살아서 행복하기 위해 공부, 대학, 취업을 거치는 것이 일반적이어 보이고 주변에서도 그런 경우를 많이 보았을 거예요.</p>
      <p>그런데 <span class="highlight">정말 공부를 열심히 하면 좋은 대학에 가서 좋은 직장에 간 후 돈을 잘 벌어서 행복할까요?</span></p>
      <p>여전히 '공부를 왜 해야하는가?'에 대한 대답으로는 조금 부족해보여요. 우리 한 번 팩트 체크를 해봅시다.</p>
    `
  },
  // ──── Page 3: 4단계 논리 ────
  {
    html: `
      <h2>팩트 체크</h2>
      <p>방금 말한 이야기를 정리해보면 이렇습니다.</p>
      <ol class="step-list">
        <li>공부를 열심히 하면 공부를 잘한다.</li>
        <li>공부를 잘하면 좋은 대학에 들어간다.</li>
        <li>좋은 대학에 들어가면 좋은 직장에 간다.</li>
        <li>좋은 직장에 가면 풍족하고 행복한 삶을 산다.</li>
      </ol>

/* ═══════════════════════════════════════════
   State
   ═══════════════════════════════════════════ */
let currentSpread = 0;
const totalPages = pages.length;
// spread = shows pages [i*2, i*2+1]
const totalSpreads = Math.ceil(totalPages / 2);

// Chat state
let chatHistory = []; // Gemini format: [{role, parts}]
let chatContext = "";
let isChatLoading = false;

/* ═══════════════════════════════════════════
   Render Book
   ═══════════════════════════════════════════ */
const pageLeft = document.getElementById("pageLeft");
const pageRight = document.getElementById("pageRight");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function renderSpread() {
  const leftIdx = currentSpread * 2;
  const rightIdx = currentSpread * 2 + 1;

  if (leftIdx < totalPages) {
    pageLeft.innerHTML = pages[leftIdx].html + `<div class="page-num">${leftIdx + 1}</div>`;
    pageLeft.classList.remove("hidden");
  } else {
    pageLeft.innerHTML = "";
    pageLeft.classList.add("hidden");
  }

  if (rightIdx < totalPages) {
    pageRight.innerHTML = pages[rightIdx].html + `<div class="page-num">${rightIdx + 1}</div>`;
    pageRight.classList.remove("hidden");
  } else {
    pageRight.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:0.3;font-size:0.85rem;text-align:center;">— 끝 —</div>';
    pageRight.classList.remove("hidden");
  }

  prevBtn.disabled = currentSpread <= 0;
  nextBtn.disabled = currentSpread >= totalSpreads - 1;

  // Restore saved answers
  restoreAnswers();
}

function restoreAnswers() {
  ["answer1", "answer2", "answer3"].forEach((id) => {
    const el = document.getElementById(id);
    if (el) {
      const saved = sessionStorage.getItem(id);
      if (saved) el.value = saved;
      el.addEventListener("input", () => {
        sessionStorage.setItem(id, el.value);
      });
    }
  });
}

prevBtn.addEventListener("click", () => {
  if (currentSpread > 0) { currentSpread--; renderSpread(); }
});
nextBtn.addEventListener("click", () => {
  if (currentSpread < totalSpreads - 1) { currentSpread++; renderSpread(); }
});

// Keyboard navigation
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") prevBtn.click();
  if (e.key === "ArrowRight") nextBtn.click();
});

renderSpread();

/* ═══════════════════════════════════════════
   Chat Logic
   ═══════════════════════════════════════════ */
const chatOverlay = document.getElementById("chatOverlay");
const chatPanel = document.getElementById("chatPanel");
const chatClose = document.getElementById("chatClose");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

function openChat() {
  chatOverlay.classList.add("open");
  chatPanel.classList.add("open");
  setTimeout(() => chatInput.focus(), 350);
}

function closeChat() {
  chatOverlay.classList.remove("open");
  chatPanel.classList.remove("open");
}

chatOverlay.addEventListener("click", closeChat);
chatClose.addEventListener("click", closeChat);

function addBubble(text, type) {
  const div = document.createElement("div");
  div.className = `chat-bubble ${type}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "chat-bubble typing";
  div.id = "typingIndicator";
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

async function sendToAI(userText) {
  if (isChatLoading) return;
  isChatLoading = true;
  chatSend.disabled = true;

  // 첫 메시지에 컨텍스트 추가
  let messageText = userText;
  if (chatHistory.length === 0 && chatContext) {
    messageText = `[CONTEXT: ${chatContext}] ${userText}`;
  }

  chatHistory.push({ role: "user", parts: [{ text: messageText }] });
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: chatHistory }),
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addBubble(err.error || "연결에 문제가 생겼어요. 다시 시도해주세요!", "ai");
      chatHistory.pop();
    } else {
      const data = await res.json();
      const reply = data.reply || "음, 잠시 생각해볼게요!";
      chatHistory.push({ role: "model", parts: [{ text: reply }] });
      addBubble(reply, "ai");
    }
  } catch {
    removeTyping();
    addBubble("인터넷 연결을 확인해주세요!", "ai");
    chatHistory.pop();
  }

  isChatLoading = false;
  chatSend.disabled = false;
  chatInput.focus();
}

// Submit from answer area
function submitAnswer(textareaId, context) {
  const textarea = document.getElementById(textareaId);
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) {
    textarea.focus();
    textarea.style.borderColor = "var(--red)";
    setTimeout(() => textarea.style.borderColor = "", 1500);
    return;
  }

  // Reset chat for new submission
  chatHistory = [];
  chatMessages.innerHTML = "";
  chatContext = context;

  addBubble(text, "user");
  openChat();
  sendToAI(text);
}
// expose globally
window.submitAnswer = submitAnswer;

// Chat input handlers
chatSend.addEventListener("click", () => {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = "";
  addBubble(text, "user");
  sendToAI(text);
});

chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    chatSend.click();
  }
});
</script>
